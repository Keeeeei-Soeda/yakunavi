# Nginx設定ファイル: /etc/nginx/sites-available/yaku-navi
# ドメイン: yaku-navi.com / サブドメイン: yakkyoku（薬局LP）, yakuzaishi（薬剤師LP）

# HTTPからHTTPSにリダイレクト（SSL設定後）
server {
    listen 80;
    server_name yaku-navi.com www.yaku-navi.com;
    return 301 https://$server_name$request_uri;
}

# サブドメイン yakkyoku（薬局向けLP）: HTTP→HTTPS
server {
    listen 80;
    server_name yakkyoku.yaku-navi.com;
    return 301 https://$server_name$request_uri;
}

# サブドメイン yakuzaishi（薬剤師向けLP）: HTTP→HTTPS
server {
    listen 80;
    server_name yakuzaishi.yaku-navi.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS設定
server {
    listen 443 ssl http2;
    server_name yaku-navi.com www.yaku-navi.com;
    
    # SSL証明書（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/yaku-navi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yaku-navi.com/privkey.pem;
    
    # SSL設定（推奨）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # ログ設定
    access_log /var/log/nginx/yaku-navi-access.log;
    error_log /var/log/nginx/yaku-navi-error.log;
    
    # フロントエンド（Next.js）※本番では next start -p 3001 で起動しているため 3001 を指定
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # バックエンドAPI
    location /api {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS対応（バックエンドで設定している場合は不要）
        # add_header Access-Control-Allow-Origin "https://yaku-navi.com" always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        # add_header Access-Control-Allow-Credentials "true" always;
        
        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 静的ファイル（Next.jsの静的アセット）
    location /_next/static {
        proxy_pass http://localhost:3001;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }
    
    # ファビコンなどの静的ファイル
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# --- サブドメイン yakkyoku.yaku-navi.com（薬局向けLP・静的HTML） ---
server {
    listen 443 ssl http2;
    server_name yakkyoku.yaku-navi.com;

    # SSL証明書（事前に certbot で取得: sudo certbot certonly --nginx -d yakkyoku.yaku-navi.com）
    ssl_certificate /etc/letsencrypt/live/yakkyoku.yaku-navi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yakkyoku.yaku-navi.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/yakkyoku-access.log;
    error_log /var/log/nginx/yakkyoku-error.log;

    # ルートは /var/www/yakkyoku（Nginx が読めるよう LP をコピーして配置）
    root /var/www/yakkyoku;
    index phaemacy_lp.html;

    location / {
        try_files $uri $uri/ /phaemacy_lp.html;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# --- サブドメイン yakuzaishi.yaku-navi.com（薬剤師向けLP・静的HTML） ---
server {
